name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cf-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PUBLIC_CF_ANALYTICS_TOKEN: ${{ secrets.PUBLIC_CF_ANALYTICS_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Anonymous shallow clone
        run: |
          git clone --depth 1 --branch "${GITHUB_REF_NAME:-main}" \
            "https://github.com/${GITHUB_REPOSITORY}.git" .
          git rev-parse HEAD

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run astro check

      - name: Validate 850-word data
        run: bun run validate

      - name: Build
        run: bun run build

      - name: Deploy to Cloudflare Pages
        env:
          # Cloudflare deployments API rejects non-ASCII commit messages
          # (error 8000111). Force a plain-ASCII message tied to the SHA.
          CF_COMMIT_MESSAGE: "deploy ${{ github.sha }}"
        run: |
          bunx wrangler pages deploy dist \
            --project-name=ogden \
            --branch=main \
            --commit-hash=${{ github.sha }} \
            --commit-message="$CF_COMMIT_MESSAGE"
